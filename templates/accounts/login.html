{% extends "base_simple.html" %}

{% block title %}Login | TechDesk Reporter{% endblock %}

{% block content %}
<div class="bg-white rounded-2xl shadow-xl p-8">
    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-14 h-14 bg-brand-50 rounded-xl mb-4">
            <svg class="w-7 h-7 text-brand-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-900">TechDesk Reporter</h1>
        <p class="text-gray-500 text-sm mt-1">Sign in to your account</p>
    </div>

    <form method="post" action="{% url 'login' %}" class="space-y-5">
        {% csrf_token %}

        <div>
            <label for="identifier" class="block text-sm font-medium text-gray-700 mb-1">Admission Number</label>
            <input type="text" id="identifier" name="identifier" placeholder="Enter your admission number" required
                   class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition">
        </div>

        <div>
            <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required
                   class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition">
        </div>

        <div class="flex items-center justify-between">
            <label class="flex items-center gap-2 text-sm text-gray-600 cursor-pointer">
                <input type="checkbox" name="remember" class="w-4 h-4 text-brand-600 border-gray-300 rounded focus:ring-brand-500">
                Remember me
            </label>
            <a href="{% url 'forgot_password' %}" class="text-sm text-brand-600 hover:text-brand-700 font-medium">Forgot password?</a>
        </div>

        <button type="submit"
                class="w-full py-2.5 bg-brand-600 hover:bg-brand-700 text-white font-semibold rounded-lg text-sm transition focus:ring-2 focus:ring-brand-500 focus:ring-offset-2">
            Login
        </button>
    </form>

    <div class="mt-6 text-center">
        <p class="text-sm text-gray-500">Don't have an account?
            <a href="{% url 'register' %}" class="text-brand-600 hover:text-brand-700 font-medium">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
