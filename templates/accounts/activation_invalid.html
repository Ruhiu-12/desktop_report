{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Activation Failed | TechDesk Reporter</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="{% static 'css/design-system-v2.css' %}" rel="stylesheet"/>
<style>.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 500,'GRAD' 0,'opsz' 24;}</style>
</head>
<body>
<div class="auth-shell">
  <div class="auth-card" style="text-align:center">
    <div style="width:56px;height:56px;border-radius:14px;background:#FEF2F2;display:flex;align-items:center;justify-content:center;margin:0 auto 20px">
      <span class="material-symbols-outlined" style="color:var(--danger);font-size:28px">error</span>
    </div>
    <h2 style="margin:0 0 8px;font-size:21px">Activation Link Invalid</h2>
    <p style="margin:0 0 24px;font-size:13px;color:var(--ink-faint)">The verification link has expired or is invalid.<br/>Please try registering again.</p>
    <a href="{% url 'register' %}" class="btn btn-primary btn-block"><span class="material-symbols-outlined">person_add</span>Register Again</a>
    <p style="text-align:center;font-size:12.5px;color:var(--ink-faint);margin-top:16px">
      <a href="{% url 'login' %}" style="color:var(--brand-dark);font-weight:700">Back to login</a></p>
  </div>
</div>
</body>
</html>
