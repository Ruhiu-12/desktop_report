{% extends "base_simple.html" %}

{% block title %}Forgot Password | TechDesk Reporter{% endblock %}

{% block content %}
<div class="bg-white rounded-2xl shadow-xl p-8">
    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-14 h-14 bg-brand-50 rounded-xl mb-4">
            <svg class="w-7 h-7 text-brand-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
            </svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-900">Reset Password</h1>
        <p class="text-gray-500 text-sm mt-1">Enter your email and we'll send you a reset link</p>
    </div>

    <form method="post" class="space-y-5">
        {% csrf_token %}

        <div>
            <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
            <input type="email" id="email" name="email" placeholder="example@email.com" required
                   class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition">
        </div>

        <button type="submit"
                class="w-full py-2.5 bg-brand-600 hover:bg-brand-700 text-white font-semibold rounded-lg text-sm transition focus:ring-2 focus:ring-brand-500 focus:ring-offset-2">
            Send Reset Link
        </button>
    </form>

    <div class="mt-6 text-center">
        <a href="{% url 'login' %}" class="text-sm text-brand-600 hover:text-brand-700 font-medium">Back to login</a>
    </div>
</div>
{% endblock %}
